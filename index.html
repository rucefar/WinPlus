<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* 核心框架 */
const $id = id => document.getElementById(id);
window.switchApp = (appId, skip = false) => {
    document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
    $id(appId + '-view').classList.add('active');
    if(appId === 'map') setTimeout(() => initMap(), 100);
    if(!skip) history.pushState({app:appId}, '', '?'+appId);
};
window.onpopstate = e => switchApp(e.state?.app || 'home', true);
window.gotoPage = (n, b) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    $id('page-'+n).classList.add('active'); b.classList.add('active');
    if(n==='mindmap') mmLoadState();
};

/* 百戰圖 */
window.hundredState = JSON.parse(localStorage.getItem('h_s') || '{}');
function hRender(){
    let h = '';
    for(let r=9; r>=0; r--){
        h += '<tr>';
        for(let c=1; c<=10; c++){
            let n = r*10+c;
            h += `<td class="${window.hundredState[n]?'checked':''}" onclick="hToggle(${n},this)">${n}</td>`;
        }
        h += '</tr>';
    }
    $id('h-grid').innerHTML = h;
}
window.hToggle = (n, el) => {
    window.hundredState[n] = !window.hundredState[n];
    el.classList.toggle('checked');
    localStorage.setItem('h_s', JSON.stringify(window.hundredState));
    if(window.triggerCloudSave) triggerCloudSave();
};

/* 組織圖 (重點修復拖拽) */
window.mmNodes=[]; window.mmSelectedId=null;
let mmX=0, mmY=0, isPanning=false;
const wrapper = $id('mm-wrapper');

function mmRender(){
    const cvs = $id('mm-canvas'); cvs.innerHTML = '';
    const svg = $id('mm-svg'); svg.innerHTML = '';
    window.mmNodes.forEach(n => {
        const e = document.createElement('div');
        e.className = 'mm-node' + (window.mmSelectedId===n.id?' selected':'');
        e.style.left = n.x+'px'; e.style.top = n.y+'px';
        e.innerHTML = `<div class="mm-node-inner" contenteditable="true">${n.text}</div>`;
        
        // 節點拖拽
        let isDraggingNode = false, sx, sy;
        const start = (ex, ey, ev) => {
            ev.stopPropagation(); isDraggingNode = true;
            window.mmSelectedId = n.id;
            sx = ex - n.x; sy = ey - n.y;
        };
        const move = (ex, ey) => {
            if(!isDraggingNode) return;
            n.x = ex - sx; n.y = ey - sy;
            e.style.left = n.x+'px'; e.style.top = n.y+'px';
            mmDrawLines();
        };
        const stop = () => { if(isDraggingNode){ isDraggingNode=false; mmSaveState(); } };

        e.onmousedown = ev => start(ev.clientX, ev.clientY, ev);
        e.ontouchstart = ev => start(ev.touches[0].clientX, ev.touches[0].clientY, ev);
        document.addEventListener('mousemove', ev => move(ev.clientX, ev.clientY));
        document.addEventListener('touchmove', ev => move(ev.touches[0].clientX, ev.touches[0].clientY), {passive:false});
        document.addEventListener('mouseup', stop); document.addEventListener('touchend', stop);
        
        e.oninput = ev => { n.text = ev.target.innerText; mmSaveState(); };
        cvs.appendChild(e);
        if(n.parentId){
            const p = window.mmNodes.find(x=>x.id===n.parentId);
            if(p){
                const l = document.createElementNS("http://www.w3.org/2000/svg","line");
                l.setAttribute("x1", n.x); l.setAttribute("y1", n.y);
                l.setAttribute("x2", p.x); l.setAttribute("y2", p.y);
                l.setAttribute("stroke", "#ccc"); svg.appendChild(l);
            }
        }
    });
}
function mmDrawLines(){ mmRender(); }

// 畫布平移 (點擊空白處)
let startX, startY;
const startPan = (ex, ey, ev) => {
    if(ev.target !== $id('mm-canvas')) return;
    isPanning = true; startX = ex - mmX; startY = ey - mmY;
    $id('page-mindmap').style.cursor = 'grabbing';
};
const movePan = (ex, ey, ev) => {
    if(!isPanning) return;
    if(ev.cancelable) ev.preventDefault();
    mmX = ex - startX; mmY = ey - startY;
    wrapper.style.transform = `translate(${mmX}px, ${mmY}px)`;
};
const stopPan = () => { isPanning = false; $id('page-mindmap').style.cursor = 'default'; };

$id('mm-canvas').onmousedown = e => startPan(e.clientX, e.clientY, e);
$id('mm-canvas').ontouchstart = e => startPan(e.touches[0].clientX, e.touches[0].clientY, e);
document.addEventListener('mousemove', e => movePan(e.clientX, e.clientY, e));
document.addEventListener('touchmove', e => movePan(e.touches[0].clientX, e.touches[0].clientY, e), {passive:false});
document.addEventListener('mouseup', stopPan); document.addEventListener('touchend', stopPan);

window.mmAddChildToSelected = () => {
    const pid = window.mmSelectedId || (window.mmNodes[0]?.id);
    const n = {id:'m'+Date.now(), text:'新夥伴', x:100-mmX, y:100-mmY, parentId:pid};
    window.mmNodes.push(n); mmSaveState(); mmRender();
};
window.mmLoadState = () => {
    window.mmNodes = JSON.parse(localStorage.getItem('mm_n') || '[]');
    if(!window.mmNodes.length) window.mmNodes=[{id:'root',text:'核心',x:150,y:150}];
    mmRender();
};
window.mmSaveState = () => { localStorage.setItem('mm_n', JSON.stringify(window.mmNodes)); if(window.triggerCloudSave) triggerCloudSave(); };
window.mmClearAll = () => { if(confirm('確定清空？')){ localStorage.removeItem('mm_n'); mmLoadState(); } };
window.mmAutoLayout = () => { window.mmNodes.forEach((n,i)=>{ n.x=150+(i%3)*120; n.y=150+Math.floor(i/3)*80; }); mmRender(); mmSaveState(); };

/* 90天跟進與地圖 */
let nCusts = [];
window.nRenderList = () => {
    let h = '';
    [0,1,2,3].forEach(s => {
        const g = nCusts.filter(c => (c.stage||0) === s);
        h += `<div style="margin-bottom:20px"><h3>階段 ${s+1} (${g.length})</h3><div class="n-grid">`;
        g.forEach(c => h += `<div class="n-ccard" onclick="nOpenEdit(${c.id})"><div class="n-avatar" style="background:#1a5fb4;color:#fff">${c.name[0]}</div><b>${c.name}</b><div style="font-size:11px;color:#999">${c.address||''}</div></div>`);
        h += `</div></div>`;
    });
    $id('n-stage-blocks').innerHTML = h;
};
window.nOpenNew = s => { window.curId=null; $id('nf-name').value=''; $id('nf-address').value=''; $id('n-list-page').style.display='none'; $id('n-form-page').style.display='block'; };
window.nOpenEdit = id => { let c=nCusts.find(x=>x.id===id); window.curId=id; $id('nf-name').value=c.name; $id('nf-address').value=c.address||''; $id('n-list-page').style.display='none'; $id('n-form-page').style.display='block'; };
window.nGoBack = () => { $id('n-form-page').style.display='none'; $id('n-list-page').style.display='block'; };
window.nSaveCustomer = () => {
    let d = {id:window.curId||Date.now(), name:$id('nf-name').value, address:$id('nf-address').value, stage:0};
    if(window.curId){ nCusts[nCusts.findIndex(x=>x.id===window.curId)] = d; } else nCusts.push(d);
    localStorage.setItem('crm_v3', JSON.stringify(nCusts)); nRenderList(); nGoBack(); if(window.triggerCloudSave) triggerCloudSave();
};

window.initMap = async () => {
    if(!window.map) { window.map = L.map('map-container').setView([25.03, 121.5], 13); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.map); }
    window.map.invalidateSize();
    $id('map-status').innerText = '定位中...';
    let cnt = 0;
    for(let c of nCusts){
        if(!c.address) continue;
        try {
            let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${c.address}`);
            let data = await res.json();
            if(data[0]) { L.marker([data[0].lat, data[0].lon]).addTo(window.map).bindPopup(c.name); cnt++; }
        } catch(e){}
    }
    $id('map-status').innerText = `已載入 ${cnt} 個點`;
};

/* 筆記本與曼陀羅 */
window.NotebookApp = {
    notes: JSON.parse(localStorage.getItem('nb')||'[]'), cur:null,
    render: function(){ $id('nb-list').innerHTML = this.notes.map(n=>`<div class="nb-item ${this.cur===n.id?'active':''}" onclick="NotebookApp.open(${n.id})">${n.title||'無標題'}</div>`).join(''); },
    newNote: function(){ let n={id:Date.now(),title:'',content:''}; this.notes.push(n); this.open(n.id); },
    open: function(id){ this.cur=id; let n=this.notes.find(x=>x.id===id); $id('nb-title-input').value=n.title; $id('nb-editor').innerHTML=n.content; this.render(); },
    titleChange: function(v){ let n=this.notes.find(x=>x.id===this.cur); if(n){n.title=v; this.save();} },
    contentChange: function(){ let n=this.notes.find(x=>x.id===this.cur); if(n){n.content=$id('nb-editor').innerHTML; this.save();} },
    save: function(){ localStorage.setItem('nb', JSON.stringify(this.notes)); if(window.triggerCloudSave) triggerCloudSave(); }
};

document.addEventListener('DOMContentLoaded', () => {
    let g = $id('big-grid');
    for(let i=0; i<81; i++){
        let d = document.createElement('div'); d.className='m-cell';
        let ta = document.createElement('textarea');
        ta.value = localStorage.getItem('mc-'+i) || '';
        ta.oninput = e => { localStorage.setItem('mc-'+i, e.target.value); if(window.triggerCloudSave) triggerCloudSave(); };
        d.appendChild(ta); g.appendChild(d);
    }
    nCusts = JSON.parse(localStorage.getItem('crm_v3')||'[]'); nRenderList();
    hRender(); NotebookApp.render();
});

/* 同步邏輯 */
window.collectAllData = () => {
    let mc={}; for(let i=0;i<81;i++) mc[i]=localStorage.getItem('mc-'+i);
    return {mc, h:window.hundredState, crm:nCusts, nb:NotebookApp.notes, mm:window.mmNodes};
};
window.restoreAllData = d => {
    if(d.mc) Object.entries(d.mc).forEach(([k,v])=>localStorage.setItem('mc-'+k, v));
    if(d.h) window.hundredState = d.h;
    if(d.crm) nCusts = d.crm;
    if(d.nb) NotebookApp.notes = d.nb;
    if(d.mm) window.mmNodes = d.mm;
    location.reload();
};
</script>

};

let timer;
window.triggerCloudSave = () => {
