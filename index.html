/* ══════════════════════════════════════════
   全域基礎設定與登入畫面
══════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; padding: 0; overflow-x: hidden; background: #f4f1ea; font-family: 'Noto Sans TC', sans-serif; }
.noise-bg { background-color: #f4f1ea; background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px), url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); background-size: 30px 30px, auto; }
.app-view { display: none; }
.app-view.active { display: block; }
#home-view.active { display: flex; }
#login-overlay { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.login-box { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; border: 1px solid rgba(255,255,255,0.5); }
.login-box h1 { font-family: 'Noto Serif TC', serif; color: #2d3436; margin-bottom: 1rem; font-weight: 900; }
.login-box p { color: #636e72; font-size: 0.9rem; line-height: 1.6; }
.cloud-status { font-size: 0.75rem; color: #888; margin-left: 10px; font-weight: 500; }
.user-profile { font-size: 0.8rem; color: rgba(0,0,0,0.6); margin-left: auto; margin-right: 15px; font-weight: 700; }
.logout-btn { background: transparent; border: 1px solid rgba(0,0,0,0.3); color: #333; border-radius: 12px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; transition: background 0.2s; }
.logout-btn:hover { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.5); color: #e85a5a; }
#nav .cloud-status { color: rgba(255,255,255,0.6); margin-left: auto; }
#nav .user-profile { color: rgba(255,255,255,0.8); }
#nav .logout-btn { color: #fff; border-color: rgba(255,255,255,0.3); }
#nav .logout-btn:hover { background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.5); color: #fff; }

/* 彈出視窗基礎樣式 */
.biz-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
.biz-modal-overlay.show { display: flex !important; }
.biz-modal { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; box-shadow: 0 12px 48px rgba(0,0,0,0.22); animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* 首頁樣式 */
#home-view { --bg-color: #f4f1ea; --text-main: #2d3436; --accent-review: #8b2020; --accent-winplus: #e8a045; --accent-hundred: #c8a96e; --glass: rgba(255, 255, 255, 0.8); --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); color: var(--text-main); min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
#home-view .header { text-align: center; margin-bottom: 3rem; animation: fadeInDown 1s ease-out; position: relative; }
#home-view .header h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 900; letter-spacing: 0.2em; margin-bottom: 1rem; background: linear-gradient(135deg, var(--accent-review), var(--accent-winplus)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
#home-view .header p { font-size: 1.1rem; color: #636e72; font-weight: 300; letter-spacing: 0.1em; }
#home-view .container { display: flex; gap: 2.5rem; max-width: 1000px; width: 100%; flex-wrap: wrap; justify-content: center; }
#home-view .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 24px; padding: 3rem 2rem; width: 450px; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.3); transition: var(--transition); position: relative; overflow: hidden; cursor: pointer; }
#home-view .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; transition: var(--transition); }
#home-view .card.review-card { border-top: 6px solid var(--accent-review); }
#home-view .card.review-card .icon { color: var(--accent-review); }
#home-view .card.winplus { border-top: 6px solid var(--accent-winplus); }
#home-view .card.winplus .icon { color: var(--accent-winplus); }
#home-view .card.ninety { border-top: 6px solid #1a5fb4; }
#home-view .card.ninety .icon { color: #1a5fb4; }
#home-view .card.map-card { border-top: 6px solid #27ae60; }
#home-view .card.map-card .icon { color: #27ae60; }
#home-view .card.hundred { border-top: 6px solid var(--accent-hundred); background: linear-gradient(180deg, rgba(200,169,110,0.05), var(--glass)); }
#home-view .card.hundred .icon { color: var(--accent-hundred); }
#home-view .card:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); background: rgba(255, 255, 255, 0.95); }
#home-view .icon { font-size: 4rem; margin-bottom: 2rem; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1)); }
#home-view .card h2 { font-size: 1.8rem; margin-bottom: 1.2rem; transition: var(--transition); font-family: 'Noto Serif TC', serif; font-weight: 700; }
#home-view .card p { font-size: 1rem; line-height: 1.8; color: #555; font-weight: 400; }
#home-view .tag { margin-top: auto; padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
#home-view .review-card .tag { background: rgba(139, 32, 32, 0.1); color: var(--accent-review); }
#home-view .winplus .tag { background: rgba(232, 160, 69, 0.1); color: var(--accent-winplus); }
#home-view .ninety .tag { background: rgba(26,95,180,0.10); color: #1a5fb4; }
#home-view .map-card .tag { background: rgba(39,174,96,0.1); color: #27ae60; }
#home-view .hundred .tag { background: rgba(200, 169, 110, 0.1); color: var(--accent-hundred); }
#home-view .footer { margin-top: 4rem; text-align: center; font-size: 0.85rem; color: #999; letter-spacing: 0.05em; }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

/* 90天系統 */
#ninety-view { --n-bg: #f5f4f0; --n-card: #ffffff; --n-bg2: #f0eeea; --n-text: #1a1a1a; --n-text2: #5c5b57; --n-text3: #9c9b97; --n-border: rgba(0,0,0,0.10); --n-border2: rgba(0,0,0,0.18); --n-blue: #1a5fb4; --n-blue-l: #e8f0fb; --n-green: #0e7d5a; --n-green-l: #e0f5ee; --n-amber: #a05c00; --n-amber-l: #fdf0d8; --n-red: #b03030; --n-red-l: #fdeaea; --n-purple: #7c5cbf; --n-pink: #903050; --n-indigo: #534AB7; --n-radius: 14px; --n-radius-sm: 8px; --n-shadow: 0 2px 8px rgba(0,0,0,0.06); background: var(--n-bg); color: var(--n-text); min-height: 100vh; overflow-y: auto; padding-bottom: 60px; }
.n-topbar { background: #1e1e1e; height: 50px; display: flex; align-items: center; padding: 0 16px; gap: 12px; position: sticky; top: 0; z-index: 50; }
.n-topbar .n-back { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.85); font-family: inherit; font-size: 0.75rem; padding: 4px 12px; border-radius: 18px; cursor: pointer; transition: all 0.2s; }
.n-topbar .n-back:hover { background: rgba(255,255,255,0.25); color: #fff; }
.n-topbar .n-bar-title { font-family: 'Noto Serif TC', serif; font-size: 0.95rem; font-weight: 700; color: rgba(255,255,255,0.9); }
.n-content { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.n-summary-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.n-chip { display: flex; align-items: center; gap: 8px; background: var(--n-card); border: 1px solid var(--n-border); border-radius: var(--n-radius-sm); padding: 8px 16px; box-shadow: var(--n-shadow); }
.n-chip .n-num { font-size: 18px; font-weight: 700; }
.n-chip .n-lbl { font-size: 11px; color: var(--n-text3); }
.n-chip-dot { width: 9px; height: 9px; border-radius: 50%; }
.n-toolbar { display: flex; gap: 10px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
.n-search-wrap { flex: 1; position: relative; min-width: 200px; }
.n-search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--n-text3); pointer-events: none; }
.n-search { width: 100%; background: var(--n-card); border: 1px solid var(--n-border); border-radius: var(--n-radius-sm); padding: 9px 14px 9px 36px; font-size: 13px; color: var(--n-text); font-family: inherit; outline: none; transition: border-color 0.15s; }
.n-search:focus { border-color: var(--n-blue); }
.n-btn-add { display: flex; align-items: center; gap: 6px; background: #1a1a1a; color: white; border: none; border-radius: var(--n-radius-sm); padding: 9px 16px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; white-space: nowrap; transition: 0.2s; }
.n-btn-add:hover { opacity: 0.85; }
.n-stage-block { margin-bottom: 32px; }
.n-stage-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.n-stage-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; border: 1.5px solid; }
.n-s1 .n-stage-lbl { color: var(--n-blue); border-color: var(--n-blue); background: var(--n-blue-l); }
.n-s2 .n-stage-lbl { color: var(--n-green); border-color: var(--n-green); background: var(--n-green-l); }
.n-s3 .n-stage-lbl { color: var(--n-amber); border-color: var(--n-amber); background: var(--n-amber-l); }
.n-s4 .n-stage-lbl { color: var(--n-purple); border-color: var(--n-purple); background: #f5f3ff; }
.n-stage-cnt { font-size: 12px; color: var(--n-text3); }
.n-stage-line { flex: 1; height: 1px; background: var(--n-border); }
.n-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px,1fr)); gap: 12px; }
.n-ccard { background: var(--n-card); border: 1px solid var(--n-border); border-radius: var(--n-radius); padding: 16px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; display: flex; flex-direction: column; gap: 8px; }
.n-ccard:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.10); border-color: var(--n-border2); }
.n-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
.n-s1 .n-avatar { background: var(--n-blue-l); color: var(--n-blue); }
.n-s2 .n-avatar { background: var(--n-green-l); color: var(--n-green); }
.n-s3 .n-avatar { background: var(--n-amber-l); color: var(--n-amber); }
.n-s4 .n-avatar { background: #f5f3ff; color: var(--n-purple); }
.n-cname { font-size: 15px; font-weight: 700; }
.n-cmeta { font-size: 12px; color: var(--n-text3); line-height: 1.6; }
.n-pdots { display: flex; gap: 3px; margin-top: 2px; }
.n-pdot { width: 6px; height: 6px; border-radius: 50%; background: var(--n-border2); }
.n-s1 .n-pdot.on { background: var(--n-blue); }
.n-s2 .n-pdot.on { background: var(--n-green); }
.n-s3 .n-pdot.on { background: var(--n-amber); }
.n-s4 .n-pdot.on { background: var(--n-purple); }
.n-add-card { background: none; border: 1.5px dashed var(--n-border2); border-radius: var(--n-radius); padding: 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--n-text3); font-size: 12px; font-family: inherit; min-height: 110px; transition: all 0.15s; }
.n-add-card:hover { border-color: var(--n-text2); color: var(--n-text2); background: var(--n-bg2); }

/* FORM */
.n-form-wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
.n-form-topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.n-form-topbar h2 { font-size: 18px; font-weight: 700; font-family: 'Noto Serif TC', serif; }
.n-back-btn { display: flex; align-items: center; gap: 6px; background: var(--n-card); border: 1px solid var(--n-border); border-radius: var(--n-radius-sm); padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--n-text2); cursor: pointer; font-family: inherit; transition: background 0.15s; }
.n-back-btn:hover { background: var(--n-bg2); }
.n-stage-toggle { display: inline-flex; background: var(--n-bg2); border: 1px solid var(--n-border); border-radius: var(--n-radius-sm); padding: 3px; gap: 2px; margin-bottom: 20px; flex-wrap: wrap; }
.n-stg-btn { padding: 7px 16px; font-size: 12px; font-weight: 600; border: none; background: none; border-radius: 6px; cursor: pointer; color: var(--n-text3); font-family: inherit; transition: all 0.15s; }
.n-stg-btn.active { background: var(--n-card); color: var(--n-blue); box-shadow: var(--n-shadow); }
.n-fgrid { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
@media (max-width: 640px) { .n-fgrid { grid-template-columns: 1fr; } }
.n-card { background: var(--n-card); border: 1px solid var(--n-border); border-radius: var(--n-radius); padding: 20px; box-shadow: var(--n-shadow); margin-bottom: 14px; }
.n-card-title { font-size: 13px; font-weight: 700; color: var(--n-text); margin-bottom: 14px; padding-left: 11px; border-left: 3px solid var(--n-blue); }
.n-card-title.green { border-left-color: var(--n-green); }
.n-card-title.purple { border-left-color: var(--n-purple); }
.n-card-dark { background: #1b2845; border-color: #2c3e5e; }
.n-card-dark .n-card-title { color: #94afd4; border-color: #4a6fa5; }
.n-field { margin-bottom: 14px; }
.n-field label { display: block; font-size: 11px; font-weight: 700; color: var(--n-text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.n-field input[type=text], .n-field input[type=date], .n-field textarea, .n-field select { width: 100%; background: var(--n-bg2); border: 1px solid var(--n-border); border-radius: var(--n-radius-sm); padding: 9px 12px; font-size: 13px; color: var(--n-text); font-family: inherit; outline: none; transition: border-color 0.15s; }
.n-field input:focus, .n-field textarea:focus, .n-field select:focus { border-color: var(--n-blue); background: #fff; }
.n-field textarea { min-height: 100px; resize: vertical; line-height: 1.6; }
.n-card-dark .n-field input, .n-card-dark .n-field textarea { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.10); color: #c5d8f0; }
.n-card-dark .n-field input:focus, .n-card-dark .n-field textarea:focus { border-color: #4a6fa5; background: rgba(255,255,255,0.09); }
.n-card-dark .n-field label { color: #6b8aad; }
.n-check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 8px; }
.n-chk { display: flex; align-items: center; gap: 8px; background: var(--n-bg2); border: 1px solid var(--n-border); border-radius: var(--n-radius-sm); padding: 9px 10px; cursor: pointer; font-size: 13px; color: var(--n-text2); transition: all 0.15s; user-select: none; }
.n-chk.on { background: var(--n-blue-l); border-color: rgba(26,95,180,0.25); color: var(--n-blue); }
.n-chk-box { width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid var(--n-border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.n-chk.on .n-chk-box { background: var(--n-blue); border-color: var(--n-blue); }
.n-chk-mark { color: white; font-size: 10px; display: none; }
.n-chk.on .n-chk-mark { display: block; }
.chk-text-green { color: #1a9a50; font-weight: 700; }
.n-chk.on .chk-text-green { color: #0e7d5a; }
.n-tag-sec { margin-bottom: 14px; }
.n-tag-sec-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--n-text3); margin-bottom: 7px; }
.n-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.n-tag { padding: 5px 13px; border-radius: 99px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.15s; user-select: none; }
.n-tag.blue { background: var(--n-blue-l); border-color: rgba(26,95,180,0.2); color: var(--n-blue); }
.n-tag.blue.on { background: var(--n-blue); color: white; border-color: var(--n-blue); }
.n-tag.green { background: var(--n-green-l); border-color: rgba(14,125,90,0.2); color: var(--n-green); }
.n-tag.green.on { background: var(--n-green); color: white; border-color: var(--n-green); }
.n-tag.pink { background: #fbeaf0; border-color: rgba(144,48,80,0.2); color: var(--n-pink); }
.n-tag.pink.on { background: var(--n-pink); color: white; border-color: var(--n-pink); }
.n-tag.indigo { background: #eeedfe; border-color: rgba(83,74,183,0.2); color: var(--n-indigo); }
.n-tag.indigo.on { background: var(--n-indigo); color: white; border-color: var(--n-indigo); }
.n-tag.purple { background: #f5f3ff; border-color: rgba(124,92,191,0.2); color: var(--n-purple); }
.n-tag.purple.on { background: var(--n-purple); color: white; border-color: var(--n-purple); }
.n-form-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--n-border); flex-wrap: wrap;}
.n-btn { padding: 9px 20px; font-size: 13px; font-weight: 600; border-radius: var(--n-radius-sm); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.n-btn-ghost { background: none; border: 1px solid var(--n-border); color: var(--n-text2); }
.n-btn-ghost:hover { background: var(--n-bg2); }
.n-btn-danger { background: none; border: 1px solid rgba(176,48,48,0.25); color: var(--n-red); }
.n-btn-danger:hover { background: var(--n-red-l); }
.n-btn-primary { background: #1a1a1a; border: none; color: white; }

/* ── REVIEW VIEW CSS (邁向目標複盤日誌) ── */
#review-view { --r-primary: #b59871; --r-success: #8dae8c; --r-bg: #f5f1eb; --r-text: #4a4036; --r-card-bg: rgba(255, 255, 255, 0.9); background: linear-gradient(135deg, var(--r-bg) 0%, #e6dfd3 100%); color: var(--r-text); min-height: 100vh; position: relative; overflow-y: auto; padding-bottom: 2rem; }
#review-view .r-container { max-width: 850px; margin: 60px auto 20px; background: var(--r-card-bg); padding: 30px 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
#review-view h1 { text-align: center; color: var(--r-primary); margin-bottom: 5px; font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight:900;}
#review-view .subtitle { text-align: center; font-size: 14px; color: #8c7e71; margin-bottom: 30px; letter-spacing: 0.1em;}
#review-view .section { margin-bottom: 25px; padding: 20px 25px; background: #ffffff; border-radius: 16px; border-left: 5px solid var(--r-primary); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
#review-view h2 { font-size: 18px; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-family: 'Noto Serif TC', serif; flex-wrap: wrap; gap:10px;}
#review-view label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; color: #5a4f44;}
#review-view textarea, #review-view input[type="text"] { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px; background: #faf8f5; transition: 0.3s; }
#review-view textarea:focus, #review-view input[type="text"]:focus { outline: none; border-color: var(--r-primary); background: #fff; }
#review-view .goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
@media (max-width: 600px) { #review-view .goal-grid { grid-template-columns: 1fr; } #review-view .r-container{ padding: 20px; margin-top: 50px;} }
#review-view .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 16px; color: var(--r-primary); }
#review-view .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
#review-view .calendar-day-header { font-size: 12px; color: #888; padding-bottom: 4px; font-weight: bold; }
#review-view .tracker-day { width: 100%; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; background: #f0ebe4; color: #999; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
#review-view .tracker-day:hover:not(.empty) { transform: scale(1.05); border-color: var(--r-primary); }
#review-view .tracker-day.completed { background: var(--r-success); color: white; font-weight: bold; box-shadow: 0 2px 5px rgba(141, 174, 140, 0.4); }
#review-view .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
#review-view button { background: var(--r-primary); color: #fff; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; font-family: inherit;}
#review-view button:hover { background: #9d805c; transform: translateY(-2px); }
#review-view button.success-btn { background: var(--r-success); width: 100%; font-size: 18px; padding: 15px; margin-top: 20px;}
#review-view button.success-btn:hover { background: #7a9c79; }
#review-view button.outline-btn { background: transparent; border: 2px solid var(--r-primary); color: var(--r-primary); }
#review-view button.outline-btn:hover { background: var(--r-primary); color: #fff; }
#review-view #r-timer { font-size: 2.5em; font-weight: 800; color: var(--r-primary); text-align: center; margin-top: 10px; font-family: monospace;}

/* ── HUNDRED VIEW CSS (百戰成功圖) ── */
#hundred-view { --h-gold: #c8a96e; --h-gold-light: #e8d5a3; --h-gold-dark: #8a6a30; --h-bg: #0f0c08; --h-bg2: #1a1510; --h-bg3: #221d14; --h-text: #f0e6d0; --h-text-muted: #9a8a6a; --h-border: rgba(200, 169, 110, 0.25); --h-border-strong: rgba(200, 169, 110, 0.5); --h-check-color: #c8a96e; --h-cell-hover: rgba(200, 169, 110, 0.08); --h-cell-checked: rgba(200, 169, 110, 0.12); background: var(--h-bg); color: var(--h-text); min-height: 100vh; display: none; flex-direction: column; align-items: center; padding: 60px 20px 60px; position: relative; overflow-x: hidden; font-family: 'Noto Sans TC', sans-serif; }
#hundred-view.active { display: flex; }
#hundred-view::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(200,169,110,0.07) 0%, transparent 70%), radial-gradient(ellipse 40% 30% at 80% 80%, rgba(200,169,110,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
#hundred-view .h-container { width: 100%; max-width: 760px; position: relative; z-index: 1; margin: 0 auto; }
#hundred-view .header { text-align: center; margin-bottom: 36px; animation: fadeDown 0.8s ease both; }
#hundred-view .header-deco { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
#hundred-view .deco-line { height: 1px; width: 60px; background: linear-gradient(90deg, transparent, var(--h-gold)); }
#hundred-view .deco-line.right { background: linear-gradient(90deg, var(--h-gold), transparent); }
#hundred-view .deco-diamond { width: 6px; height: 6px; background: var(--h-gold); transform: rotate(45deg); }
#hundred-view h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(28px, 5vw, 42px); font-weight: 700; letter-spacing: 8px; color: var(--h-gold-light); text-shadow: 0 0 40px rgba(200,169,110,0.3); margin-bottom: 20px; margin-top: 0; }
#hundred-view .description { font-size: 13px; color: var(--h-text-muted); line-height: 2; letter-spacing: 0.5px; max-width: 500px; margin: 0 auto 20px; }
#hundred-view .slogan { font-family: 'Noto Serif TC', serif; font-size: clamp(16px, 3vw, 22px); font-weight: 600; letter-spacing: 6px; color: var(--h-gold); border: 1px solid var(--h-border-strong); display: inline-block; padding: 10px 32px; position: relative; }
#hundred-view .slogan::before, #hundred-view .slogan::after { content: ''; position: absolute; width: 8px; height: 8px; border-color: var(--h-gold); border-style: solid; }
#hundred-view .slogan::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
#hundred-view .slogan::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
#hundred-view .stats-bar { display: flex; justify-content: center; gap: 40px; margin-bottom: 28px; animation: fadeDown 0.8s 0.2s ease both; }
#hundred-view .stat { text-align: center; }
#hundred-view .stat-num { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; color: var(--h-gold); line-height: 1; transition: all 0.3s ease; }
#hundred-view .stat-label { font-size: 11px; color: var(--h-text-muted); letter-spacing: 2px; margin-top: 4px; }
#hundred-view .stat-divider { width: 1px; background: var(--h-border); align-self: stretch; }
#hundred-view .progress-wrap { margin-bottom: 28px; animation: fadeDown 0.8s 0.3s ease both; }
#hundred-view .progress-track { height: 3px; background: var(--h-bg3); border-radius: 2px; overflow: hidden; position: relative; }
#hundred-view .progress-fill { height: 100%; background: linear-gradient(90deg, var(--h-gold-dark), var(--h-gold), var(--h-gold-light)); border-radius: 2px; width: 0%; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }
#hundred-view .progress-fill::after { content: ''; position: absolute; right: 0; top: -2px; width: 7px; height: 7px; background: var(--h-gold-light); border-radius: 50%; box-shadow: 0 0 8px var(--h-gold); }
#hundred-view .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--h-text-muted); margin-top: 8px; letter-spacing: 1px; }
#hundred-view .grid-wrap { border: 1px solid var(--h-border-strong); position: relative; animation: fadeUp 0.8s 0.4s ease both; background: var(--h-bg2); padding: 1px; }
#hundred-view .grid-wrap::before { content: ''; position: absolute; inset: -1px; border: 1px solid transparent; background: linear-gradient(135deg, rgba(200,169,110,0.4), transparent 40%, transparent 60%, rgba(200,169,110,0.2)) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; pointer-events: none; }
#hundred-view table.grid { width: 100%; border-collapse: collapse; table-layout: fixed; }
#hundred-view table.grid td { border: 1px solid var(--h-border); text-align: center; vertical-align: middle; cursor: pointer; position: relative; height: 56px; transition: background 0.15s ease; overflow: hidden; }
#hundred-view table.grid td:hover:not(.platinum) { background: var(--h-cell-hover); border-color: var(--h-border-strong); }
#hundred-view table.grid td.checked { background: var(--h-cell-checked); }
#hundred-view table.grid td.checked:hover { background: rgba(200, 169, 110, 0.18); }
#hundred-view .cell-num { font-size: 11px; color: var(--h-text-muted); position: absolute; top: 4px; left: 5px; line-height: 1; user-select: none; transition: opacity 0.2s; font-family: 'Noto Sans TC', sans-serif; }
#hundred-view td.checked .cell-num { opacity: 0.4; }
#hundred-view .cell-check { font-size: 20px; color: var(--h-check-color); font-weight: 600; opacity: 0; transform: scale(0.5) rotate(-10deg); transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); display: block; line-height: 1; }
#hundred-view td.checked .cell-check { opacity: 1; transform: scale(1) rotate(0deg); }
#hundred-view td.platinum { background: linear-gradient(135deg, var(--h-gold-dark), var(--h-gold), var(--h-gold-light)); cursor: default; position: relative; }
#hundred-view td.platinum::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent); }
#hundred-view .platinum-text { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; color: var(--h-bg); letter-spacing: 2px; position: relative; z-index: 1; }
#hundred-view .complete-banner { display: none; text-align: center; padding: 24px; margin-top: 20px; border: 1px solid var(--h-border-strong); background: linear-gradient(135deg, rgba(200,169,110,0.08), transparent); animation: fadeUp 0.6s ease both; }
#hundred-view .complete-banner.show { display: block; }
#hundred-view .complete-banner p { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--h-gold-light); letter-spacing: 3px; }
#hundred-view .reset-btn { margin-top: 24px; display: flex; justify-content: center; animation: fadeUp 0.8s 0.5s ease both; }
#hundred-view button.reset { background: transparent; border: 1px solid var(--h-border); color: var(--h-text-muted); font-family: inherit; font-size: 12px; letter-spacing: 3px; padding: 10px 28px; cursor: pointer; transition: all 0.2s ease; }
#hundred-view button.reset:hover { border-color: var(--h-border-strong); color: var(--h-gold); background: var(--h-cell-hover); }

/* ── WINPLUS VIEW CSS (包含曼陀羅、組織圖、筆記本) ── */
#winplus-view { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; background: #fff; }
#nav { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: #1e1e1e; z-index: 9000; display: flex; align-items: center; padding: 0 8px; gap: 4px; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
#nav::-webkit-scrollbar { display: none; }
.nav-logo { font-family: 'Caveat', cursive; font-size: 1.1rem; color: #f0ebe0; white-space: nowrap; flex-shrink: 0; margin-right: 10px;}
.tab-btn { padding: 4px 9px; border: 1.5px solid rgba(255,255,255,.25); background: transparent; color: rgba(255,255,255,.6); font-family: inherit; font-size: .7rem; cursor: pointer; border-radius: 18px; white-space: nowrap; transition: all .2s; flex-shrink: 0; }
.tab-btn.active { background: #e8a045; border-color: #e8a045; color: #fff; }
.tab-btn.home-btn { background: rgba(255,255,255,0.1); margin-right: 10px; }
.tab-btn.home-btn:hover { background: rgba(255,255,255,0.3); color: #fff; border-color: #fff; }
.page { position: absolute; top: 50px; left: 0; right: 0; bottom: 0; overflow: hidden; display: none; visibility: hidden; pointer-events: none; z-index: 1; }
.page.active { display: block; visibility: visible; pointer-events: auto; z-index: 10; }
#page-mandala.active    { display: flex; }
#page-mindmap.active    { display: block; }
#page-notebook.active   { display: flex; flex-direction: column; }

/* 曼陀羅 */
#page-mandala { background: #fff; overflow: auto; align-items: center; justify-content: center; }
#winplus-view { --grid-size: min(clamp(252px, 58vw, 680px), clamp(252px, calc(100vh - 170px), 680px)); --cell-size: calc(var(--grid-size) / 9); --left-w: clamp(90px, 13vw, 165px); }
.mandala-wrapper { display: flex; gap: clamp(6px, 1.5vw, 20px); align-items: flex-start; padding: clamp(8px, 2vw, 20px); }
.mandala-left { display: flex; flex-direction: column; padding: 6px; width: var(--left-w); flex-shrink: 0; }
.mandala-brand { text-align: center; margin-bottom: clamp(8px, 1.5vh, 18px); }
.mandala-brand-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: clamp(1rem, 2.8vw, 1.75rem); font-weight: 700; background: linear-gradient(135deg, #c9783c, #e8b845, #4a7c8e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.15; }
.left-field { display: flex; align-items: center; gap: clamp(4px, 0.8vw, 9px); margin-bottom: clamp(5px, 1.2vh, 13px); }
.left-dot { width: clamp(20px, 3vw, 34px); height: clamp(20px, 3vw, 34px); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(.48rem, 1vw, .68rem); font-weight: 700; color: #fff; }
.d-date{background:#4ab8b8} .d-ttl{background:#a8c44a} .d-name{background:#e85a3c} .d-memo{background:#7c5ab8}
.left-input { flex: 1; border: none; border-bottom: 1.5px solid #ddd; background: transparent; font-family: inherit; font-size: clamp(.58rem, 1.2vw, .78rem); outline: none; padding: 2px 0; color: #333; }
.big-grid { display: grid; grid-template-columns: repeat(9, 1fr); grid-template-rows: repeat(9, 1fr); border: 2.5px solid #222; background: #222; gap: 1px; width: var(--grid-size); height: var(--grid-size); flex-shrink: 0; }
.m-cell { background: #fff; position: relative; overflow: hidden; }
.m-cell.bl { border-left: 2.5px solid #222; } .m-cell.bt { border-top: 2.5px solid #222; }
.m-cell textarea { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; border: none; outline: none; resize: none; font-family: inherit; font-size: clamp(.42rem, 1vw, .62rem); color: #333; padding: clamp(9px, 1.6vw, 15px) 2px 2px 2px; text-align: center; line-height: 1.35; }
.cell-code { position: absolute; top: 2px; left: 3px; font-size: clamp(.38rem, 0.9vw, .52rem); color: rgba(0,0,0,.3); pointer-events: none; font-weight: 700; z-index: 1; }
.cA{background:#f5e6b0} .cA .cell-code{color:#b8900a} .cB{background:#f5c0a8} .cB .cell-code{color:#c05030} .cC{background:#b0dff0} .cC .cell-code{color:#1a7aaa} .cD{background:#b0dff0} .cD .cell-code{color:#1a7aaa} .cE{background:#f5c0d8} .cE .cell-code{color:#b03070} .cF{background:#f5c0d8} .cF .cell-code{color:#b03070} .cG{background:#b0f0c8} .cG .cell-code{color:#1a9a50} .cH{background:#b0f0c8} .cH .cell-code{color:#1a9a50} .cM{background:#fff5cc} .cM .cell-code{color:#b8900a}

/* 組織網路圖 (Mind Map) */
#page-mindmap { background: #f5f1ea; background-image: radial-gradient(circle at 20% 80%, rgba(74,124,142,.06) 0%, transparent 60%), radial-gradient(circle at 80% 20%, rgba(201,120,60,.06) 0%, transparent 60%); position:relative; overflow:hidden; }
#mm-workspace { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: 0 0; }
#mm-svg { position: absolute; top: 0; left: 0; width: 1px; height: 1px; overflow: visible; pointer-events: none; }
#mm-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
.mm-hint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: .7rem; color: rgba(26,26,46,.35); pointer-events: none; white-space: nowrap; z-index: 50; background:rgba(255,255,255,0.6); padding:4px 10px; border-radius:12px; }
.mm-toolbar { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; z-index: 100; background: #1e1e1e; padding: 7px 12px; border-radius: 40px; box-shadow: 0 6px 24px rgba(0,0,0,.25); max-width: calc(100vw - 24px); flex-wrap: wrap; justify-content: center; }
@media (max-width: 480px) { .mm-toolbar { bottom: 12px; top: auto; border-radius: 20px; padding: 5px 10px; } .mm-hint { display: none; } }
.mm-btn { padding: 6px 12px; border: none; background: rgba(255,255,255,.1); color: #f0ebe0; font-family: inherit; font-size: clamp(.65rem, 2vw, .76rem); cursor: pointer; border-radius: 22px; transition: background .15s; letter-spacing: .03em; white-space: nowrap; }
.mm-btn:hover { background: rgba(255,255,255,.2); }
.mm-btn.danger { color: #ff9a9a; }
.mm-node { position: absolute; transform: translate(-50%, -50%); min-width: 72px; max-width: 160px; text-align: center; cursor: grab; z-index: 10; pointer-events: auto; }
.mm-node:active { cursor: grabbing; }
.mm-node-inner { padding: 8px 14px; border-radius: 26px; background: #fff; border: 2px solid rgba(26,26,46,.15); box-shadow: 0 3px 14px rgba(26,26,46,.12); font-size: .82rem; line-height: 1.5; word-break: break-all; transition: border-color .18s, box-shadow .18s; position: relative; }
.mm-node.root > .mm-node-inner { background: #1e1e1e; color: #f0ebe0; border-color: #1e1e1e; font-size: .95rem; font-weight: 500; border-radius: 32px; padding: 11px 20px; }
.mm-node.selected > .mm-node-inner { border-color: #e8a045; box-shadow: 0 0 0 3px rgba(232,160,69,.22), 0 3px 14px rgba(26,26,46,.12); }
.mm-node-text { outline: none; min-width: 36px; display: inline-block; white-space: pre-wrap; cursor: text; }
.mm-node-add { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; background: #e8a045; color: #fff; border: none; border-radius: 50%; font-size: 14px; line-height: 20px; cursor: pointer; display: none; z-index: 15; }
.mm-node-del { position: absolute; left: -10px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; background: #e05a5a; color: #fff; border: none; border-radius: 50%; font-size: 11px; line-height: 18px; cursor: pointer; display: none; z-index: 15; }
.mm-node:hover .mm-node-add, .mm-node.selected .mm-node-add { display: block; }
.mm-node:hover .mm-node-del, .mm-node.selected .mm-node-del { display: block; }
.mm-node:hover .mm-node-link-btn, .mm-node.selected .mm-node-link-btn { display: flex !important; }
.mm-node:hover .mm-node-unlink-btn, .mm-node.selected .mm-node-unlink-btn { display: flex !important; }
.mm-node.root .mm-node-del { display: none !important; }

/* 筆記本 (Notebook) */
#page-notebook { background: #f5f2ec; overflow: hidden; height: 100%; }
#nb-layout { display: flex; width: 100%; height: 100%; min-height: 0; overflow: hidden; }
#nb-sidebar { width: clamp(140px, 28vw, 220px); flex-shrink: 0; background: #fff; border-right: 1px solid #e8e2d8; display: flex; flex-direction: column; overflow: visible; }
#nb-sidebar-top { padding: 10px 14px 8px 10px; border-bottom: 1px solid #ede8e0; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
#nb-search { flex: 1; padding: 6px 9px; border: 1.5px solid #e0dbd2; border-radius: 20px; font-family: inherit; font-size: .72rem; outline: none; background: #faf8f5; color: #333; }
#nb-search:focus { border-color: #e8a045; }
#nb-new-btn { width: 30px; height: 30px; border: none; border-radius: 50%; background: #e8a045; color: #fff; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(232,160,69,.45); transition: background .15s, transform .1s; margin-right: 2px; }
#nb-new-btn:hover { background: #d09030; transform: scale(1.08); }
#nb-list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 6px 0; scrollbar-width: thin; scrollbar-color: #ddd transparent; }
#nb-list::-webkit-scrollbar { width: 3px; }
#nb-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
.nb-item { padding: 9px 13px; cursor: pointer; border-left: 3px solid transparent; transition: background .12s, border-color .12s; position: relative; }
.nb-item:hover { background: #faf7f2; }
.nb-item.active { background: #fdf5e8; border-left-color: #e8a045; }
.nb-item-title { font-family: inherit; font-size: .78rem; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nb-item-preview { font-family: inherit; font-size: .65rem; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nb-item-date { font-size: .58rem; color: #ccc; margin-top: 3px; }
.nb-item-del { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border: none; background: rgba(200,0,0,.12); color: #c03030; border-radius: 50%; font-size: 9px; cursor: pointer; display: none; align-items: center; justify-content: center; padding: 0; }
.nb-item:hover .nb-item-del { display: flex; }
.nb-item-del:hover { background: rgba(200,0,0,.28); }
#nb-empty-hint { text-align: center; color: #ccc; font-size: .72rem; padding: 30px 16px; display:
