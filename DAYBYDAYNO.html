<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日復盤・一分鐘版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #12172a;
    --surface: #1d2540;
    --card: #f5f0e6;
    --card-alt: #ede8dc;
    --ink: #1a1f36;
    --ink-soft: #3d4468;
    --jade: #6db394;
    --jade-light: #a8d5bc;
    --amber: #e8a030;
    --amber-light: #f5c870;
    --lavender: #9b92cc;
    --red-soft: #d46b6b;
    --muted: #8a8ea8;
    --serif: 'Noto Serif TC', serif;
    --sans: 'Noto Sans TC', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--card);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%,  rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 65% 15%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }

  .wrap { width: 100%; max-width: 640px; position: relative; z-index: 1; }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 2rem; }
  .header-date { font-weight: 300; font-size: 0.8rem; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.6rem; }
  .header h1 { font-family: var(--serif); font-size: 1.7rem; font-weight: 700; color: var(--card); line-height: 1.3; letter-spacing: 0.05em; }
  .header-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.4rem; letter-spacing: 0.05em; }

  /* ── Streak card ── */
  .streak-card {
    background: var(--surface); border-radius: 14px;
    padding: 1rem 1.2rem 1.1rem; margin-bottom: 1.5rem;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .streak-top { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.9rem; }
  .streak-flame { font-size: 1.4rem; line-height: 1; }
  .streak-info { flex: 1; }
  .streak-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; }
  .streak-count { font-family: var(--serif); font-size: 1.1rem; font-weight: 600; color: var(--amber-light); }
  .streak-month-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-align: right; margin-bottom: 0.5rem; }
  .streak-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; }
  .s-cell {
    aspect-ratio: 1; border-radius: 5px;
    background: rgba(255,255,255,0.07);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; color: rgba(255,255,255,0.25);
    transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
    cursor: default;
  }
  .s-cell.filled { background: var(--amber); color: #fff; font-size: 0.6rem; box-shadow: 0 0 6px rgba(232,160,48,0.45); }
  .s-cell.today-cell { outline: 2px solid var(--jade); outline-offset: 1px; }
  .s-cell.filled.today-cell { background: var(--jade); box-shadow: 0 0 8px rgba(109,179,148,0.5); }

  /* ── Section cards ── */
  .section {
    background: var(--card); border-radius: 16px;
    padding: 1.5rem; margin-bottom: 1.1rem;
    color: var(--ink); transition: box-shadow 0.3s;
  }
  .section:focus-within { box-shadow: 0 0 0 2px var(--jade), 0 8px 32px rgba(0,0,0,0.25); }
  .section-label { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
  .section-num {
    width: 22px; height: 22px; background: var(--ink); color: var(--card);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 600; font-family: var(--sans); flex-shrink: 0;
  }
  .section-title { font-family: var(--serif); font-size: 1rem; font-weight: 700; color: var(--ink); letter-spacing: 0.02em; }
  .section-hint { font-size: 0.76rem; color: var(--ink-soft); margin-bottom: 1.1rem; padding-left: 30px; line-height: 1.6; }
  .section[data-type="highlight"] .section-num { background: var(--jade); }
  .section[data-type="snag"]      .section-num { background: var(--red-soft); }
  .section[data-type="tomorrow"]  .section-num { background: var(--lavender); }

  /* ── Energy ── */
  .energy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .energy-btn {
    border: 2px solid transparent; background: var(--card-alt);
    border-radius: 12px; padding: 0.8rem 0.7rem;
    cursor: pointer; display: flex; align-items: center;
    gap: 0.6rem; transition: all 0.2s;
    font-family: var(--sans); color: var(--ink); text-align: left;
  }
  .energy-btn:hover { background: #e8e3d5; transform: translateY(-1px); }
  .energy-btn.selected {
    border-color: var(--ink); background: var(--ink); color: var(--card);
    transform: translateY(-2px); box-shadow: 0 4px 16px rgba(26,31,54,0.3);
  }
  .energy-btn .e-icon { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
  .energy-btn .e-text { font-size: 0.8rem; line-height: 1.4; font-weight: 400; }
  .energy-btn .e-text strong { display: block; font-weight: 600; font-size: 0.85rem; }

  /* ── Textarea ── */
  .field-wrap { position: relative; }
  .field-wrap textarea {
    width: 100%; background: var(--card-alt);
    border: 2px solid transparent; border-radius: 10px;
    padding: 0.85rem 1rem; font-family: var(--sans);
    font-size: 0.88rem; color: var(--ink); resize: none;
    line-height: 1.7; transition: border-color 0.2s, background 0.2s;
    outline: none; min-height: 68px;
  }
  .field-wrap textarea:focus { border-color: var(--jade); background: #f0ebe0; }
  .field-wrap textarea::placeholder { color: #aaa8a0; font-style: italic; }
  .char-count { position: absolute; bottom: 8px; right: 12px; font-size: 0.68rem; color: #bbb; pointer-events: none; }

  /* ── Button row ── */
  .btn-row { display: flex; gap: 0.7rem; margin-top: 0.5rem; }
  .submit-btn {
    flex: 1; background: var(--jade); color: white; border: none;
    border-radius: 14px; padding: 1rem;
    font-family: var(--serif); font-size: 1rem; font-weight: 600;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.25s;
  }
  .submit-btn:hover { background: #5da882; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(109,179,148,0.4); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn.done { background: var(--amber); cursor: default; }
  .submit-btn:disabled { opacity: 0.85; }
  .pdf-btn {
    background: var(--surface); color: rgba(245,240,230,0.8);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 1rem 1.2rem;
    font-family: var(--sans); font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .pdf-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); transform: translateY(-1px); }

  /* ── Success overlay ── */
  .success-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(12,16,36,0.92); z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1.2rem;
    text-align: center; padding: 2rem;
  }
  .success-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .success-ring {
    width: 90px; height: 90px; border-radius: 50%;
    background: var(--jade); display: flex; align-items: center;
    justify-content: center; font-size: 2.2rem;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 40px rgba(109,179,148,0.5);
  }
  @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-title { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--card); }
  .success-msg { font-size: 0.85rem; color: var(--muted); max-width: 300px; line-height: 1.8; }
  .success-summary {
    background: var(--surface); border-radius: 14px;
    padding: 1.2rem 1.5rem; width: 100%; max-width: 360px;
    text-align: left; border: 1px solid rgba(255,255,255,0.07);
  }
  .sum-row {
    display: flex; gap: 0.6rem; align-items: flex-start;
    padding: 0.45rem 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.8rem; color: rgba(245,240,230,0.8); line-height: 1.5;
  }
  .sum-row:last-child { border-bottom: none; }
  .sum-label { color: var(--muted); white-space: nowrap; }
  .close-btn {
    background: transparent; border: 2px solid rgba(255,255,255,0.2);
    color: var(--card); border-radius: 10px; padding: 0.7rem 2rem;
    font-family: var(--sans); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); }

  /* ── Print ── */
  @media print {
    body { background: #fff !important; color: #1a1f36 !important; padding: 1cm 1.5cm; }
    body::before { display: none; }
    .streak-card { background: #f5f0e6 !important; border: 1px solid #ddd; }
    .s-cell { background: #eee !important; color: #999 !important; }
    .s-cell.filled { background: #e8a030 !important; color: #fff !important; }
    .s-cell.filled.today-cell { background: #6db394 !important; }
    .section { background: #f5f0e6 !important; border: 1px solid #ddd; page-break-inside: avoid; }
    .section:focus-within { box-shadow: none; }
    .field-wrap textarea { background: #ede8dc !important; border: 1px solid #ccc !important; }
    .btn-row, .success-overlay { display: none !important; }
    .energy-btn { border: 1px solid #ccc !important; }
    .energy-btn.selected { background: #1a1f36 !important; color: #f5f0e6 !important; border-color: #1a1f36 !important; }
    .streak-count { color: #c07a10 !important; }
    .streak-label, .header-date, .header-sub, .streak-month-label { color: #666 !important; }
    .section-hint { color: #555 !important; }
    @page { margin: 1.5cm; size: A4; }
  }

  @media (max-width: 480px) {
    .energy-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.4rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <div class="header-date" id="dateLabel"></div>
    <h1>每日復盤</h1>
    <div class="header-sub">一分鐘・一句話・一點微光</div>
  </header>

  <!-- 30-day streak -->
  <div class="streak-card">
    <div class="streak-top">
      <div class="streak-flame">🔥</div>
      <div class="streak-info">
        <div class="streak-label">連續紀錄</div>
        <div class="streak-count" id="streakCount">載入中…</div>
      </div>
    </div>
    <div class="streak-month-label" id="streakMonthLabel"></div>
    <div class="streak-grid" id="streakGrid"></div>
  </div>

  <!-- 1. Energy -->
  <div class="section" data-type="energy">
    <div class="section-label">
      <div class="section-num">1</div>
      <div class="section-title">能量羅盤</div>
    </div>
    <div class="section-hint">今天整體的能量與專注度狀態如何？</div>
    <div class="energy-grid">
      <button class="energy-btn" data-value="excellent" onclick="selectEnergy(this)">
        <span class="e-icon">🌟</span>
        <span class="e-text"><strong>狀態極佳</strong>充滿幹勁，執行力滿分</span>
      </button>
      <button class="energy-btn" data-value="stable" onclick="selectEnergy(this)">
        <span class="e-icon">🟢</span>
        <span class="e-text"><strong>平穩安定</strong>順利完成預定任務</span>
      </button>
      <button class="energy-btn" data-value="stuck" onclick="selectEnergy(this)">
        <span class="e-icon">🟡</span>
        <span class="e-text"><strong>稍微卡關</strong>遇到干擾或有些拖延</span>
      </button>
      <button class="energy-btn" data-value="low" onclick="selectEnergy(this)">
        <span class="e-icon">🔴</span>
        <span class="e-text"><strong>能量低谷</strong>疲憊心不在焉，需要休息</span>
      </button>
    </div>
  </div>

  <!-- 2. Highlight -->
  <div class="section" data-type="highlight">
    <div class="section-label">
      <div class="section-num">2</div>
      <div class="section-title">亮點捕手</div>
    </div>
    <div class="section-hint">今天最值得給自己拍手的一件事，或是感受到的一點小微光是什麼？</div>
    <div class="field-wrap">
      <textarea id="highlight" placeholder="例：今天終於把拖了三天的報告送出去了。" maxlength="80" rows="2" oninput="updateCount(this,'hc')"></textarea>
      <span class="char-count"><span id="hc">0</span>/80</span>
    </div>
  </div>

  <!-- 3. Snag -->
  <div class="section" data-type="snag">
    <div class="section-label">
      <div class="section-num">3</div>
      <div class="section-title">系統抓漏</div>
    </div>
    <div class="section-hint">今天在哪個環節卡住了？（外在干擾就寫干擾，自己拖延就寫誘惑源）</div>
    <div class="field-wrap">
      <textarea id="snag" placeholder="例：下午會議後滑了一小時社群，沒守住番茄鐘。" maxlength="80" rows="2" oninput="updateCount(this,'sc')"></textarea>
      <span class="char-count"><span id="sc">0</span>/80</span>
    </div>
  </div>

  <!-- 4. Tomorrow -->
  <div class="section" data-type="tomorrow">
    <div class="section-label">
      <div class="section-num">4</div>
      <div class="section-title">明日微調</div>
    </div>
    <div class="section-hint">為了讓明天更好，我要做出的一個「1% 微小改變」是什麼？</div>
    <div class="field-wrap">
      <textarea id="tomorrow" placeholder="例：明天開工前先把手機放進抽屜，再開電腦。" maxlength="80" rows="2" oninput="updateCount(this,'tc')"></textarea>
      <span class="char-count"><span id="tc">0</span>/80</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">完成今日復盤 ✓</button>
    <button class="pdf-btn" onclick="window.print()">📄 存成 PDF</button>
  </div>

</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-ring">✓</div>
  <div class="success-title">今日復盤完成！</div>
  <div class="success-msg" id="successMsg">給自己一個擊掌 👏<br>你又多了一天的清醒紀錄。</div>
  <div class="success-summary" id="summaryBox"></div>
  <button class="close-btn" onclick="closeSuccess()">關閉 · 明天見</button>
</div>

<script>
const STORAGE_KEY = 'daily_review_v1';

function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayKey() { return dateKey(new Date()); }

function formatDate() {
  const d = new Date();
  const wd = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日　${wd[d.getDay()]}`;
}
document.getElementById('dateLabel').textContent = formatDate();

function calcStreak(data) {
  const today = new Date(); let streak = 0;
  for (let i = 0; i < 90; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (data[dateKey(d)]?.done) streak++; else break;
  }
  return streak;
}

const energyEmoji = { excellent:'🌟', stable:'🟢', stuck:'🟡', low:'🔴' };

function renderStreak() {
  const data = loadData();
  const streak = calcStreak(data);
  document.getElementById('streakCount').textContent = streak === 0 ? '尚未開始' : `連續 ${streak} 天`;

  const today = new Date();
  const start = new Date(today); start.setDate(start.getDate() - 29);
  const sm = start.getMonth()+1, em = today.getMonth()+1;
  document.getElementById('streakMonthLabel').textContent =
    sm === em ? `${today.getFullYear()} 年 ${sm} 月` : `${start.getFullYear()} 年 ${sm} 月 ─ ${em} 月`;

  const grid = document.getElementById('streakGrid');
  grid.innerHTML = '';
  const todayK = todayKey();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const k = dateKey(d); const entry = data[k];
    const cell = document.createElement('div');
    cell.className = 's-cell' + (entry?.done ? ' filled' : '') + (k === todayK ? ' today-cell' : '');
    cell.textContent = (entry?.done && entry.energy) ? (energyEmoji[entry.energy] || '✓') : d.getDate();
    cell.title = `${d.getMonth()+1}/${d.getDate()}` + (entry?.done ? `\n${entry.highlight || ''}` : '');
    grid.appendChild(cell);
  }
}
renderStreak();

let selectedEnergy = null;
function selectEnergy(btn) {
  document.querySelectorAll('.energy-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedEnergy = btn.dataset.value;
}

function updateCount(el, id) { document.getElementById(id).textContent = el.value.length; }

const energyLabels = { excellent:'🌟 狀態極佳', stable:'🟢 平穩安定', stuck:'🟡 稍微卡關', low:'🔴 能量低谷' };

function submitForm() {
  if (!selectedEnergy) { alert('請先選擇今天的能量狀態 🙏'); return; }
  const highlight = document.getElementById('highlight').value.trim();
  const snag      = document.getElementById('snag').value.trim();
  const tomorrow  = document.getElementById('tomorrow').value.trim();

  const data = loadData();
  data[todayKey()] = { done:true, energy:selectedEnergy, highlight, snag, tomorrow, ts:Date.now() };
  saveData(data);

  document.getElementById('summaryBox').innerHTML = `
    <div class="sum-row"><span class="sum-label">能量</span><span>${energyLabels[selectedEnergy]}</span></div>
    ${highlight ? `<div class="sum-row"><span class="sum-label">亮點</span><span>${escHtml(highlight)}</span></div>` : ''}
    ${snag      ? `<div class="sum-row"><span class="sum-label">卡點</span><span>${escHtml(snag)}</span></div>` : ''}
    ${tomorrow  ? `<div class="sum-row"><span class="sum-label">明日</span><span>${escHtml(tomorrow)}</span></div>` : ''}
  `;

  const streak = calcStreak(data);
  const msgEl = document.getElementById('successMsg');
  if (streak >= 30)     msgEl.innerHTML = `🏆 連續 ${streak} 天！習慣已經是你的一部分了。`;
  else if (streak >= 7) msgEl.innerHTML = `🔥 連續 ${streak} 天！你正在建立一個真正的習慣。`;
  else if (streak >= 3) msgEl.innerHTML = `🌱 連續 ${streak} 天，繼續保持這份動力！`;
  else                  msgEl.innerHTML = `給自己一個擊掌 👏<br>你又多了一天的清醒紀錄。`;

  document.getElementById('successOverlay').classList.add('show');
  renderStreak();

  const btn = document.getElementById('submitBtn');
  btn.textContent = '今日已完成 ✓';
  btn.classList.add('done');
  btn.disabled = true;
}

function closeSuccess() { document.getElementById('successOverlay').classList.remove('show'); }

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

(function() {
  const data = loadData();
  const entry = data[todayKey()];
  if (!entry?.done) return;
  if (entry.energy) {
    const btn = document.querySelector(`.energy-btn[data-value="${entry.energy}"]`);
    if (btn) { btn.classList.add('selected'); selectedEnergy = entry.energy; }
  }
  ['highlight','snag','tomorrow'].forEach(id => {
    if (entry[id]) {
      document.getElementById(id).value = entry[id];
      document.getElementById({highlight:'hc',snag:'sc',tomorrow:'tc'}[id]).textContent = entry[id].length;
    }
  });
  const btn = document.getElementById('submitBtn');
  btn.textContent = '今日已完成 ✓';
  btn.classList.add('done');
  btn.disabled = true;
})();
</script>
</body>
</html>
